# ============================================================
# CI (Continuous Integration) 워크플로우
#
# 목적: 코드를 push하거나 PR을 열 때마다 자동으로
#       - 코드 스타일 검사 (Lint)
#       - 자동 테스트 실행
#       - 테스트 커버리지 확인
# 을 수행하여 코드 품질을 지켜줍니다.
# ============================================================

name: CI - 테스트 & 린트

# ① 언제 이 워크플로우를 실행할까?
on:
  push:
    branches:
      - main        # main 브랜치에 push될 때
      - 'feature/**' # feature/로 시작하는 브랜치에 push될 때
  pull_request:
    branches:
      - main        # main 브랜치로 향하는 PR이 열릴 때

jobs:
  # ============================================================
  # Job 1: 린트 (코드 스타일 검사)
  # ============================================================
  lint:
    name: 코드 스타일 검사 (ESLint)
    runs-on: ubuntu-latest   # GitHub이 제공하는 가상 머신에서 실행

    steps:
      # 코드 체크아웃: 저장소 코드를 가상 머신으로 가져옴
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # Node.js 환경 세팅
      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'       # node_modules 캐싱으로 속도 향상

      # 의존성 설치
      - name: 패키지 설치
        run: npm ci           # npm install보다 재현 가능한 설치

      # ESLint 실행
      - name: ESLint 실행
        run: npm run lint

  # ============================================================
  # Job 2: 테스트 (여러 Node.js 버전에서 동시 실행)
  # ============================================================
  test:
    name: 테스트 (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint   # lint job이 성공해야 이 job이 시작됨

    # matrix 전략: 여러 버전을 병렬로 테스트
    strategy:
      matrix:
        node-version: ['18', '20', '22']  # 세 버전을 동시에 테스트!
      fail-fast: false   # 하나가 실패해도 나머지는 계속 실행

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js ${{ matrix.node-version }} 설치
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 패키지 설치
        run: npm ci

      # 테스트 실행 및 커버리지 측정
      - name: 테스트 실행
        run: npm test

      # 테스트 결과 리포트를 GitHub PR에 표시
      - name: 테스트 커버리지 업로드
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20'   # Node 20 결과만 업로드
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ============================================================
  # Job 3: CI 최종 상태 알림
  # ============================================================
  ci-status:
    name: CI 결과 확인
    runs-on: ubuntu-latest
    needs: [lint, test]   # lint와 test 둘 다 완료 후 실행
    if: always()          # 앞의 job이 실패해도 항상 실행

    steps:
      - name: CI 성공 여부 확인
        run: |
          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ CI 통과! 코드가 안전합니다."
            exit 0
          else
            echo "❌ CI 실패! 머지하기 전에 문제를 수정하세요."
            echo "  Lint: ${{ needs.lint.result }}"
            echo "  Test: ${{ needs.test.result }}"
            exit 1
          fi
