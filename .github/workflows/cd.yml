# ============================================================
# CD (Continuous Deployment) 워크플로우
#
# 목적: main 브랜치에 코드가 머지되면 자동으로
#       - 빌드 & 패키징
#       - 스테이징 환경에 배포
#       - (승인 후) 프로덕션 배포
# 를 수행합니다.
#
# 실습 참고: 실제 배포 대신 배포 과정을 시뮬레이션합니다.
#            실제 프로젝트에서는 AWS, Vercel, Railway 등
#            실제 클라우드 서비스와 연결합니다.
# ============================================================

name: CD - 자동 배포

on:
  push:
    branches:
      - main    # main 브랜치에 push될 때만 실행 (PR 머지 포함)

  # 수동으로 워크플로우를 실행할 수도 있음
  workflow_dispatch:
    inputs:
      environment:
        description: '배포할 환경을 선택하세요'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# 동시에 여러 배포가 실행되지 않도록 제어
concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: 빌드 및 패키징
  # ============================================================
  build:
    name: 빌드 & 패키징
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci --production  # devDependencies 제외하고 설치

      # 빌드 결과물을 다른 job에서 재사용할 수 있도록 저장
      - name: 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ github.sha }}
          path: |
            src/
            package.json
            package-lock.json
          retention-days: 1

      # 커밋 정보 출력 (배포 추적용)
      - name: 배포 정보 출력
        run: |
          echo "📦 빌드 완료"
          echo "  커밋: ${{ github.sha }}"
          echo "  브랜치: ${{ github.ref_name }}"
          echo "  작성자: ${{ github.actor }}"
          echo "  메시지: ${{ github.event.head_commit.message }}"

  # ============================================================
  # Job 2: 스테이징 배포
  # ============================================================
  deploy-staging:
    name: 스테이징 배포
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://my-app-staging.example.com  # 실제 스테이징 URL로 교체

    steps:
      - name: 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: app-build-${{ github.sha }}

      # 실제 배포 명령어 (예: AWS, Vercel, Railway 등)
      # 여기서는 시뮬레이션합니다.
      - name: 스테이징 서버에 배포
        run: |
          echo "🚀 스테이징 환경에 배포 시작..."
          echo "  대상: https://my-app-staging.example.com"
          # 실제 배포 명령 예시:
          # npx vercel --token ${{ secrets.VERCEL_TOKEN }} --env staging
          # aws s3 sync ./dist s3://my-staging-bucket
          sleep 2  # 배포 시간 시뮬레이션
          echo "✅ 스테이징 배포 완료!"

      # 배포 후 헬스체크 (서버가 정상 동작하는지 확인)
      - name: 스테이징 헬스체크
        run: |
          echo "🔍 스테이징 서버 상태 확인..."
          # 실제 헬스체크 예시:
          # curl -f https://my-app-staging.example.com/health || exit 1
          echo "✅ 스테이징 서버 정상 동작 확인"

  # ============================================================
  # Job 3: 프로덕션 배포 (수동 승인 필요)
  # ============================================================
  deploy-production:
    name: 프로덕션 배포
    runs-on: ubuntu-latest
    needs: deploy-staging
    # environment에 required reviewers를 설정하면 수동 승인 창이 뜸
    # GitHub 저장소 Settings > Environments > production > Protection rules
    environment:
      name: production
      url: https://my-app.example.com

    steps:
      - name: 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: app-build-${{ github.sha }}

      - name: 프로덕션 서버에 배포
        run: |
          echo "🚀 프로덕션 환경에 배포 시작..."
          echo "  대상: https://my-app.example.com"
          echo "  커밋: ${{ github.sha }}"
          # 실제 배포 명령:
          # npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod
          sleep 2
          echo "✅ 프로덕션 배포 완료!"

      - name: 프로덕션 헬스체크
        run: |
          echo "🔍 프로덕션 서버 상태 확인..."
          echo "✅ 프로덕션 서버 정상 동작 확인"

      - name: 배포 완료 알림 (Slack 예시)
        run: |
          echo "📢 배포 알림 발송"
          echo "  새 버전이 프로덕션에 배포되었습니다!"
          # 실제 Slack 알림 예시:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"✅ 배포 완료! 커밋: ${{ github.sha }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
